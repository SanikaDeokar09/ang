<div class="container">

    <h2>Register User</h2>

    <form (ngSubmit)="registerUser()">

        <input
        type="text"
        placeholder="Enter Name"
        [(ngModel)]="user.name"
        name="name"
        required>

        <input
        type="email"
        placeholder="Enter Email"
        [(ngModel)]="user.email"
        name="email"
        required>

        <input
        type="password"
        placeholder="Enter Password"
        [(ngModel)]="user.password"
        name="password"
        required>

        <button type="submit">Register</button>

    </form>

    <p>
        Already have account?
        <a routerLink="/login">Login</a>
    </p>

</div>
